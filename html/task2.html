<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="img">
       <header>
    <img src="https://img.freepik.com/free-vector/job-application-concept-illustrated_23-2148816400.jpg" alt="Job Header" class="header-img">
</header>

        <main>
            <h1>Job Application Form</h1>
            <hr>

            <form>
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label>Full Name:</label>
                        <div class="name-inputs">
                            <input type="text" placeholder="First Name" required>
                            <input type="text" placeholder="Middle Name">
                            <input type="text" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" placeholder="+123456789">
                    </div>

                    <div class="form-group">
                        <label for="resume">Upload Resume (PDF only):</label>
                        <input type="file" id="resume" accept=".pdf">
                    </div>

                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" placeholder="Enter a secure password">
                    </div>

                    <div class="form-group">
                        <label>Gender:</label>
                        <div class="radio-group">
                            <input type="radio" id="male" name="gender" value="male">
                            <label for="male">Male</label>
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Female</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dept">Preferred Department:</label>
                        <select id="dept">
                            <option value="">Select Department</option>
                            <option value="it">IT</option>
                            <option value="hr">HR</option>
                            <option value="marketing">Marketing</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="about">Tell us about yourself:</label>
                        <textarea id="about" rows="4" placeholder="Briefly describe your experience..."></textarea>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the terms and conditions</label>
                    </div>

                    <button type="submit" class="submit-btn">Submit Application</button>
                </fieldset>
            </form>
        </main>

        <footer>
            <p>&copy; 2025 Job Portal</p>
        </footer>
    </div>

</body>
                      </html>
